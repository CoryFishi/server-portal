  zomboid:
    container_name: serverportal_zomboid
    image: renegademaster/zomboid-dedicated-server:latest
    profiles:
    - zomboid
    environment:
      SERVER_NAME: MyZomboid
      ADMIN_PASSWORD: change-me
    ports:
    - 16261:16261/udp
    - 16262:16262/udp
    volumes:
    - ./data/zomboid:/home/steam/Zomboid
    restart: unless-stopped
  palworld:
    container_name: serverportal_palworld
    image: thijsvanloef/palworld-server-docker:latest
    profiles:
    - palworld
    environment:
      SERVER_NAME: MyPalworld
      SERVER_PASSWORD: change-me
      ADMIN_PASSWORD: change-me
    ports:
    - 8211:8211/udp
    - 27015:27015/udp
    volumes:
    - ./data/palworld:/palworld
    restart: unless-stopped
