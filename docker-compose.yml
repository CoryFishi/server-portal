services:
  mc_paper_121:
    container_name: serverportal_mc_paper_121
    image: itzg/minecraft-server:java21
    profiles:
    - mc_paper_121
    environment:
      EULA: TRUE
      TYPE: PAPER
      VERSION: 1.21.1
      MEMORY: 6G
      ENABLE_RCON: true
      RCON_PASSWORD: change-me
      RCON_PORT: 25575
    ports:
    - 25565:25565
    - 25575:25575
    volumes:
    - ./data/mc_paper_121:/data
    restart: unless-stopped
  mc_atm9:
    container_name: serverportal_mc_atm9
    image: itzg/minecraft-server:java21
    profiles:
    - mc_atm9
    environment:
      EULA: TRUE
      TYPE: FORGE
      VERSION: 1.20.1
      MEMORY: 10G
      ENABLE_RCON: true
      RCON_PASSWORD: change-me
      RCON_PORT: 25575
    ports:
    - 25565:25565
    - 25575:25575
    volumes:
    - ./data/mc_atm9:/data
    restart: unless-stopped
  mc_prominence2:
